# Crowdin config, consumed by the GitHub Action (.github/workflows/crowdin-sync.yml),
# which runs the Crowdin CLI. (The in-app GitHub integration was dropped because it
# ignored skip_untranslated_* and kept committing English-clone files.)
#
# Source language: English. English + Spanish are maintained in code (es is NOT a
# Crowdin target); every other language comes from the community via Crowdin.
# Download options (skip_untranslated_*) live in the workflow, not here.
preserve_hierarchy: true
files:
  - source: /src/i18n/locales/en.json
    translation: /src/i18n/locales/%two_letters_code%.json

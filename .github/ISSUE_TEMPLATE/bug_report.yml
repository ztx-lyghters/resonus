name: Bug report
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Tap…
        3. See…
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      description: Settings, at the bottom (e.g. 0.2.0).
    validations:
      required: false
  - type: dropdown
    id: server
    attributes:
      label: Server
      options:
        - Navidrome
        - Jellyfin
        - Ampache
        - Other OpenSubsonic
        - Local (no server)
    validations:
      required: false

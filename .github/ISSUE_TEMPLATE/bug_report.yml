name: Bug report
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: latest
    attributes:
      label: Before reporting
      options:
        - label: I'm on the latest [release](https://github.com/juananzzz/resonus/releases). You can check your version under Settings › About.
          required: true
  - type: textarea
    id: what
    attributes:
      label: Description
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Tap…
        3. See…
    validations:
      required: false
  - type: dropdown
    id: server
    attributes:
      label: Server
      options:
        - Navidrome
        - Jellyfin
        - Ampache
        - Other OpenSubsonic
        - Local (no server)
    validations:
      required: false
